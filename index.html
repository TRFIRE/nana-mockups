<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanã Studio Mockups</title>
    <!-- Tailwind CSS para o estilo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configuração do PWA Básica -->
    <meta name="theme-color" content="#f43f5e">
    <link rel="apple-touch-icon" href="https://lucide.dev/favicon.ico">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-bounce-slow { animation: bounce 2s infinite; }
    </style>
</head>
<body class="bg-rose-50">
    <div id="root"></div>

    <!-- Importando React e Lucide Icons via ESM -->
    <script type="module">
        import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
            Upload, Image as ImageIcon, Sparkles, Download, AlertCircle, 
            RefreshCw, Loader2, Info, Wallpaper, Key 
        } from 'https://esm.sh/lucide-react@0.244.0';

        const apiKey = ""; // Sua chave API opcional

        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                const img = new Image();
                img.src = reader.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1024;
                    const MAX_HEIGHT = 1024;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const mimeType = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
                    resolve(canvas.toDataURL(mimeType, 0.85));
                };
                img.onerror = () => resolve(reader.result);
            };
            reader.onerror = (error) => reject(error);
        });

        const fetchWithRetry = async (url, options, retries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`Erro na API (${response.status}): ${errText}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        };

        function App() {
            const [background, setBackground] = useState(null);
            const [mockupBase, setMockupBase] = useState(null);
            const [artwork, setArtwork] = useState(null);
            const [resultImage, setResultImage] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [error, setError] = useState(null);
            const [customKey, setCustomKey] = useState("");

            const backgroundInputRef = useRef(null);
            const mockupInputRef = useRef(null);
            const artworkInputRef = useRef(null);

            const handleFileUpload = async (e, type) => {
                const file = e.target.files[0];
                if (!file) return;
                setError(null);
                try {
                    const dataUrl = await fileToBase64(file);
                    const matches = dataUrl.match(/^data:(.+);base64,(.+)$/);
                    if (matches) {
                        const fileData = { mimeType: matches[1], data: matches[2], previewUrl: dataUrl };
                        if (type === 'background') setBackground(fileData);
                        if (type === 'mockup') setMockupBase(fileData);
                        if (type === 'artwork') setArtwork(fileData);
                        setResultImage(null);
                    }
                } catch (err) { setError("Erro ao processar imagem."); }
            };

            const generateMockup = async () => {
                if (!mockupBase || !artwork) {
                    setError("Carregue a Caneca e a Estampa.");
                    return;
                }
                setIsGenerating(true);
                setError(null);
                const promptText = background 
                    ? `I am providing 3 images: Image 1: Background/Scene. Image 2: Mug mockup base. Image 3: Artwork design. Tasks: 1. Composite the Mug Mockup (Image 2) over the Background (Image 1) with realistic shadows. 2. Apply the Artwork (Image 3) onto the mug as a realistic sublimation print.`
                    : `Apply the Artwork onto the mug base as a realistic sublimation print. Match perspective and lighting.`;
                
                const imageParts = [];
                if (background) imageParts.push({ inlineData: { mimeType: background.mimeType, data: background.data } });
                imageParts.push({ inlineData: { mimeType: mockupBase.mimeType, data: mockupBase.data } });
                imageParts.push({ inlineData: { mimeType: artwork.mimeType, data: artwork.data } });

                try {
                    const key = customKey || apiKey;
                    if (!key) throw new Error("API Key ausente. Insira uma chave Gemini.");
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${key}`;
                    const response = await fetchWithRetry(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: promptText }, ...imageParts] }], generationConfig: { responseModalities: ["TEXT", "IMAGE"] } })
                    });
                    const imagePart = response.candidates?.[0]?.content?.parts.find(p => p.inlineData);
                    if (imagePart) setResultImage(`data:${imagePart.inlineData.mimeType};base64,${imagePart.inlineData.data}`);
                    else throw new Error("A IA não retornou imagem.");
                } catch (err) { setError(err.message); } finally { setIsGenerating(false); }
            };

            return React.createElement('div', { className: 'min-h-screen pb-12' }, [
                // Header
                React.createElement('header', { className: 'bg-white shadow-sm border-b border-rose-100 sticky top-0 z-10 p-4 mb-8' }, 
                    React.createElement('div', { className: 'max-w-6xl mx-auto flex items-center justify-between' }, [
                        React.createElement('div', { className: 'flex items-center gap-2' }, [
                            React.createElement(Sparkles, { className: 'text-rose-500 w-6 h-6' }),
                            React.createElement('h1', { className: 'text-xl font-bold text-rose-600' }, 'Nanã Studio Mockups')
                        ])
                    ])
                ),
                // Main Content
                React.createElement('main', { className: 'max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8' }, [
                    // Coluna Controles
                    React.createElement('div', { className: 'lg:col-span-4 flex flex-col gap-4' }, [
                        // Erro Box
                        error && React.createElement('div', { className: 'p-4 bg-red-100 text-red-700 rounded-xl text-sm border border-red-200' }, [
                            React.createElement('p', null, error),
                            React.createElement('input', { 
                                type: 'password', 
                                placeholder: 'Insira sua API Key aqui...', 
                                value: customKey, 
                                onChange: (e) => setCustomKey(e.target.value),
                                className: 'w-full mt-2 p-2 border rounded'
                            })
                        ]),
                        // Upload Fundo
                        React.createElement('div', { className: 'bg-white p-4 rounded-xl shadow-sm border' }, [
                            React.createElement('h2', { className: 'text-sm font-bold mb-2' }, '1. Cenário (Opcional)'),
                            React.createElement('div', { 
                                onClick: () => backgroundInputRef.current.click(),
                                className: 'border-2 border-dashed p-4 text-center cursor-pointer rounded-lg hover:bg-slate-50'
                            }, background ? React.createElement('img', { src: background.previewUrl, className: 'h-16 mx-auto object-cover' }) : 'Adicionar Fundo'),
                            React.createElement('input', { type: 'file', hidden: true, ref: backgroundInputRef, onChange: (e) => handleFileUpload(e, 'background') })
                        ]),
                        // Upload Caneca
                        React.createElement('div', { className: 'bg-white p-4 rounded-xl shadow-sm border' }, [
                            React.createElement('h2', { className: 'text-sm font-bold mb-2' }, '2. Caneca Base'),
                            React.createElement('div', { 
                                onClick: () => mockupInputRef.current.click(),
                                className: 'border-2 border-dashed p-4 text-center cursor-pointer rounded-lg hover:bg-rose-50 border-rose-200'
                            }, mockupBase ? React.createElement('img', { src: mockupBase.previewUrl, className: 'h-16 mx-auto object-contain' }) : 'Adicionar Caneca'),
                            React.createElement('input', { type: 'file', hidden: true, ref: mockupInputRef, onChange: (e) => handleFileUpload(e, 'mockup') })
                        ]),
                        // Upload Estampa
                        React.createElement('div', { className: 'bg-white p-4 rounded-xl shadow-sm border' }, [
                            React.createElement('h2', { className: 'text-sm font-bold mb-2' }, '3. Estampa'),
                            React.createElement('div', { 
                                onClick: () => artworkInputRef.current.click(),
                                className: 'border-2 border-dashed p-4 text-center cursor-pointer rounded-lg hover:bg-slate-50'
                            }, artwork ? React.createElement('img', { src: artwork.previewUrl, className: 'h-16 mx-auto object-contain' }) : 'Adicionar Arte'),
                            React.createElement('input', { type: 'file', hidden: true, ref: artworkInputRef, onChange: (e) => handleFileUpload(e, 'artwork') })
                        ]),
                        // Botão Ação
                        React.createElement('button', {
                            onClick: generateMockup,
                            disabled: isGenerating,
                            className: `w-full p-4 rounded-xl font-bold text-white shadow-lg transition ${isGenerating ? 'bg-rose-300' : 'bg-rose-500 hover:bg-rose-600'}`
                        }, isGenerating ? 'Gerando Mockup...' : 'Criar Mockup Realista')
                    ]),
                    // Coluna Resultado
                    React.createElement('div', { className: 'lg:col-span-8 bg-white rounded-2xl shadow-inner border min-h-[400px] flex items-center justify-center p-4' }, 
                        isGenerating 
                            ? React.createElement('div', { className: 'text-center' }, [
                                React.createElement(Loader2, { className: 'w-12 h-12 text-rose-500 animate-spin mx-auto mb-2' }),
                                React.createElement('p', { className: 'text-slate-500' }, 'Processando arte e luz...')
                            ])
                            : resultImage 
                                ? React.createElement('div', { className: 'text-center w-full' }, [
                                    React.createElement('img', { src: resultImage, className: 'max-w-full max-h-[500px] mx-auto rounded shadow-lg mb-4' }),
                                    React.createElement('button', { 
                                        onClick: () => { const a = document.createElement('a'); a.href = resultImage; a.download = 'mockup.png'; a.click(); },
                                        className: 'flex items-center gap-2 mx-auto bg-slate-800 text-white px-6 py-2 rounded-full'
                                    }, [React.createElement(Download, { size: 16 }), 'Baixar Imagem'])
                                ])
                                : React.createElement('div', { className: 'text-slate-300 text-center' }, [
                                    React.createElement(ImageIcon, { size: 64, className: 'mx-auto opacity-20 mb-2' }),
                                    'Aguardando suas imagens...'
                                ])
                    )
                ])
            ]);
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
