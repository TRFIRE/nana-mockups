<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanã Studio Mockups - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="theme-color" content="#f43f5e">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-rose-50 min-h-screen">
    <div id="root"></div>

    <script type="module">
        import React, { useState, useRef } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
            Upload, Image as ImageIcon, Sparkles, Download, AlertCircle, 
            RefreshCw, Loader2, Info, Wallpaper, Settings, ExternalLink 
        } from 'https://esm.sh/lucide-react@0.244.0';

        // Chave vazia permite que o ambiente de teste funcione automaticamente aqui.
        const apiKey = ""; 

        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                const img = new Image();
                img.src = reader.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 1024;
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.85));
                };
            };
            reader.onerror = reject;
        });

        const fetchWithRetry = async (url, options, retries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`Erro na API (${response.status})`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        };

        function App() {
            const [background, setBackground] = useState(null);
            const [mockupBase, setMockupBase] = useState(null);
            const [artwork, setArtwork] = useState(null);
            const [resultImage, setResultImage] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [error, setError] = useState(null);
            const [customKey, setCustomKey] = useState("");
            const [showSettings, setShowSettings] = useState(false);

            const backgroundInputRef = useRef(null);
            const mockupInputRef = useRef(null);
            const artworkInputRef = useRef(null);

            const handleFileUpload = async (e, type) => {
                const file = e.target.files[0];
                if (!file) return;
                setError(null);
                try {
                    const dataUrl = await fileToBase64(file);
                    const matches = dataUrl.match(/^data:(.+);base64,(.+)$/);
                    const fileData = { mimeType: matches[1], data: matches[2], previewUrl: dataUrl };
                    if (type === 'background') setBackground(fileData);
                    if (type === 'mockup') setMockupBase(fileData);
                    if (type === 'artwork') setArtwork(fileData);
                    setResultImage(null);
                } catch (err) { setError("Erro ao processar imagem."); }
            };

            const generateMockup = async () => {
                if (!mockupBase || !artwork) {
                    setError("Carregue a Caneca e a Estampa primeiro.");
                    return;
                }
                setIsGenerating(true);
                setError(null);

                const promptText = background 
                    ? "Composite the mug from Image 2 over the background in Image 1. Then apply the design from Image 3 onto the mug as a realistic sublimation print. Match lighting and perspective."
                    : "Apply the design from Image 2 onto the mug in Image 1 as a realistic sublimation print. Match perspective, lighting, and surface texture perfectly.";
                
                const imageParts = [];
                if (background) imageParts.push({ inlineData: { mimeType: background.mimeType, data: background.data } });
                imageParts.push({ inlineData: { mimeType: mockupBase.mimeType, data: mockupBase.data } });
                imageParts.push({ inlineData: { mimeType: artwork.mimeType, data: artwork.data } });

                try {
                    const effectiveKey = customKey || apiKey;
                    const modelName = "gemini-2.5-flash-image-preview";
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${effectiveKey}`;
                    
                    const result = await fetchWithRetry(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }, ...imageParts] }],
                            generationConfig: { responseModalities: ["TEXT", "IMAGE"] }
                        })
                    });

                    const imagePart = result.candidates?.[0]?.content?.parts.find(p => p.inlineData);
                    if (imagePart) {
                        setResultImage(`data:${imagePart.inlineData.mimeType};base64,${imagePart.inlineData.data}`);
                    } else {
                        throw new Error("A IA não retornou uma imagem. Tente novamente.");
                    }
                } catch (err) {
                    setError("Erro ao gerar mockup. Se estiver no GitHub, certifique-se de configurar a API Key correta nas configurações.");
                } finally {
                    setIsGenerating(false);
                }
            };

            return React.createElement('div', { className: 'min-h-screen pb-12' }, [
                // Header
                React.createElement('header', { className: 'bg-white shadow-md border-b border-rose-100 sticky top-0 z-10 p-4 mb-6' }, 
                    React.createElement('div', { className: 'max-w-6xl mx-auto flex items-center justify-between' }, [
                        React.createElement('div', { className: 'flex items-center gap-2' }, [
                            React.createElement(Sparkles, { className: 'text-rose-500 w-6 h-6' }),
                            React.createElement('h1', { className: 'text-xl font-bold text-rose-600' }, 'Nanã Studio Pro')
                        ]),
                        React.createElement('button', { 
                            onClick: () => setShowSettings(!showSettings),
                            className: 'p-2 hover:bg-rose-50 rounded-full transition-colors'
                        }, React.createElement(Settings, { size: 20, className: 'text-slate-500' }))
                    ])
                ),

                // Main Content
                React.createElement('main', { className: 'max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-6' }, [
                    
                    // Coluna Controles
                    React.createElement('div', { className: 'lg:col-span-4 flex flex-col gap-4' }, [
                        
                        // Painel de Configurações
                        showSettings && React.createElement('div', { className: 'bg-slate-800 text-white p-4 rounded-xl shadow-xl mb-2' }, [
                            React.createElement('h3', { className: 'text-xs font-bold uppercase mb-3 opacity-80' }, 'Configurações de API'),
                            React.createElement('p', { className: 'text-[10px] mb-2 opacity-70' }, 'Necessário apenas para uso fora desta plataforma (ex: GitHub Pages).'),
                            React.createElement('input', {
                                type: 'password',
                                value: customKey,
                                onChange: (e) => setCustomKey(e.target.value),
                                className: 'w-full p-2 bg-slate-700 rounded text-sm border-none focus:ring-1 focus:ring-rose-400 outline-none',
                                placeholder: 'Cole sua Gemini API Key...'
                            })
                        ]),

                        // Erro Box
                        error && React.createElement('div', { className: 'p-4 bg-red-50 text-red-700 rounded-xl text-xs border border-red-200' }, [
                            React.createElement('div', { className: 'flex gap-2 font-bold' }, [
                                React.createElement(AlertCircle, { size: 14 }), 'Aviso'
                            ]),
                            React.createElement('p', { className: 'mt-1' }, error)
                        ]),

                        // Uploads
                        ['background', 'mockup', 'artwork'].map((type, idx) => {
                            const labels = ['1. Cenário de Fundo (Opcional)', '2. Caneca Branca (PNG)', '3. Estampa da Caneca'];
                            const state = type === 'background' ? background : type === 'mockup' ? mockupBase : artwork;
                            const ref = type === 'background' ? backgroundInputRef : type === 'mockup' ? mockupInputRef : artworkInputRef;
                            
                            return React.createElement('div', { key: type, className: 'bg-white p-4 rounded-xl shadow-sm border border-slate-100' }, [
                                React.createElement('h2', { className: 'text-xs font-bold text-slate-500 mb-2 uppercase' }, labels[idx]),
                                React.createElement('div', { 
                                    onClick: () => ref.current.click(),
                                    className: `border-2 border-dashed p-6 text-center cursor-pointer rounded-lg transition-all ${state ? 'border-emerald-400 bg-emerald-50' : 'border-slate-200 hover:border-rose-300 hover:bg-rose-50'}`
                                }, state 
                                    ? React.createElement('img', { src: state.previewUrl, className: 'h-20 mx-auto object-contain rounded' })
                                    : React.createElement('div', { className: 'flex flex-col items-center gap-1 text-slate-400' }, [
                                        React.createElement(Upload, { size: 24 }),
                                        React.createElement('span', { className: 'text-xs' }, 'Toque para enviar')
                                    ])
                                ),
                                React.createElement('input', { type: 'file', hidden: true, ref: ref, onChange: (e) => handleFileUpload(e, type) })
                            ]);
                        }),

                        React.createElement('button', {
                            onClick: generateMockup,
                            disabled: isGenerating,
                            className: `w-full p-4 rounded-xl font-bold text-white shadow-lg transition-all ${isGenerating ? 'bg-rose-300' : 'bg-rose-500 hover:bg-rose-600 shadow-rose-200'}`
                        }, isGenerating ? 'A gerar...' : 'Criar Mockup Profissional')
                    ]),

                    // Coluna Resultado
                    React.createElement('div', { className: 'lg:col-span-8 bg-white rounded-2xl shadow-sm border border-slate-100 min-h-[500px] flex items-center justify-center p-6 relative overflow-hidden' }, 
                        isGenerating 
                            ? React.createElement('div', { className: 'text-center z-10' }, [
                                React.createElement(Loader2, { className: 'w-16 h-16 text-rose-500 animate-spin mx-auto mb-4' }),
                                React.createElement('p', { className: 'text-slate-600 font-semibold' }, 'Sublimando imagens...'),
                                React.createElement('p', { className: 'text-slate-400 text-sm' }, 'Isto pode levar alguns segundos.')
                            ])
                            : resultImage 
                                ? React.createElement('div', { className: 'text-center w-full animate-in fade-in zoom-in duration-500' }, [
                                    React.createElement('img', { src: resultImage, className: 'max-w-full max-h-[600px] mx-auto rounded-lg shadow-2xl mb-6 border-4 border-white' }),
                                    React.createElement('div', { className: 'flex justify-center gap-4' }, [
                                        React.createElement('button', { 
                                            onClick: () => { const a = document.createElement('a'); a.href = resultImage; a.download = 'meu-mockup.png'; a.click(); },
                                            className: 'flex items-center gap-2 bg-emerald-600 text-white px-8 py-3 rounded-full font-bold hover:bg-emerald-700 shadow-lg transition'
                                        }, [React.createElement(Download, { size: 18 }), 'Guardar']),
                                        React.createElement('button', { 
                                            onClick: () => setResultImage(null),
                                            className: 'flex items-center gap-2 bg-slate-100 text-slate-600 px-8 py-3 rounded-full font-bold hover:bg-slate-200 transition'
                                        }, [React.createElement(RefreshCw, { size: 18 }), 'Novo'])
                                    ])
                                ])
                                : React.createElement('div', { className: 'text-slate-300 text-center' }, [
                                    React.createElement(ImageIcon, { size: 80, className: 'mx-auto opacity-10 mb-4' }),
                                    React.createElement('p', { className: 'text-xl font-medium' }, 'Seu Mockup aparecerá aqui'),
                                    React.createElement('p', { className: 'text-sm mt-2 opacity-60' }, 'Use os botões à esquerda para começar.')
                                ])
                    )
                ])
            ]);
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
